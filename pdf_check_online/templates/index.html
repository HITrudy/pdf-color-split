<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 黑白/彩色分类</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow">
          <div class="card-body p-4">
            <h2 class="card-title text-center mb-4">PDF 黑白/彩色分类</h2>
            <p class="text-muted text-center small mb-4">
              上传一个 PDF 文件，系统将按页检测颜色，拆分为黑白和彩色两个 PDF。
            </p>

            <form id="uploadForm" enctype="multipart/form-data">
              <div class="mb-3">
                <label for="pdfFile" class="form-label">选择 PDF 文件</label>
                <input type="file" class="form-control" id="pdfFile" name="pdf" accept=".pdf" required>
              </div>

              <div class="mb-3">
                <label for="cutoff" class="form-label">
                  截断页数 <span class="text-muted">（可选）</span>
                </label>
                <input type="number" class="form-control" id="cutoff" name="cutoff"
                       min="1" placeholder="此页之后均归为黑白，留空则全部检测">
                <div class="form-text">例如输入 5，则第 5 页之后不检测颜色，直接归入黑白 PDF。</div>
              </div>

              <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                上传并处理
              </button>
            </form>

            <div id="loading" class="text-center mt-3 d-none">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2 text-muted">正在处理中，请稍候...</p>
            </div>

            <div id="result" class="mt-4 d-none">
              <hr>
              <h5 class="mb-3">处理完成</h5>
              <div id="summary" class="alert alert-info"></div>
              <div id="downloadSection" class="d-flex gap-2"></div>
            </div>

            <div id="error" class="mt-3 d-none">
              <div class="alert alert-danger" role="alert"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const formData = new FormData();
      const fileInput = document.getElementById('pdfFile');
      const cutoffInput = document.getElementById('cutoff');

      if (!fileInput.files[0]) return;

      formData.append('pdf', fileInput.files[0]);
      if (cutoffInput.value) {
        formData.append('cutoff', cutoffInput.value);
      }

      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loading').classList.remove('d-none');
      document.getElementById('result').classList.add('d-none');
      document.getElementById('error').classList.add('d-none');

      try {
        const response = await fetch('/upload', { method: 'POST', body: formData });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '处理失败');
        }

        // Show summary
        const summary = document.getElementById('summary');
        summary.textContent = `共 ${data.page_count} 页，其中彩色 ${data.color_count} 页，黑白 ${data.bw_count} 页。`;

        // Show download buttons
        const dlSection = document.getElementById('downloadSection');
        dlSection.innerHTML = '';
        if (data.bw_url) {
          dlSection.innerHTML += `<a href="${data.bw_url}" class="btn btn-outline-secondary flex-fill" download>⬇ 黑白 PDF</a>`;
        }
        if (data.color_url) {
          dlSection.innerHTML += `<a href="${data.color_url}" class="btn btn-outline-primary flex-fill" download>⬇ 彩色 PDF</a>`;
        }

        document.getElementById('result').classList.remove('d-none');
      } catch (err) {
        const errDiv = document.getElementById('error');
        errDiv.querySelector('.alert').textContent = err.message;
        errDiv.classList.remove('d-none');
      } finally {
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('loading').classList.add('d-none');
      }
    });
  </script>
</body>
</html>
